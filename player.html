<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyector de Letras - Cafecito o Miedo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* Lark Player Style Overrides */
    :root {
      --primary-color: #ffffff;
      --secondary-color: rgba(255,255,255,0.8);
      --tertiary-color: rgba(255,255,255,0.5);
      --accent-color: #ff3b30;
      --background-dark: #050505;
      --background-card: rgba(255,255,255,0.05);
      --border-radius: 16px;
    }

    body {
      background-color: var(--background-dark);
      color: var(--primary-color);
      margin: 0;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Title Bar */
    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background-color: rgba(5,5,5,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      height: 44px;
    }

    .titlebar-title {
      font-weight: 500;
      font-size: 16px;
      color: var(--secondary-color);
    }

    .titlebar-btns {
      display: flex;
      gap: 8px;
    }

    .tb-btn {
      background: none;
      border: none;
      color: var(--secondary-color);
      font-size: 14px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tb-btn:hover {
      background-color: rgba(255,255,255,0.1);
    }

    .tb-close {
      color: #ff453a;
    }

    /* Main Player Container */
    .player-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 44px); /* Account for title bar */
      position: relative;
      overflow: hidden;
    }

    /* Album Cover Section */
    .album-cover-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      text-align: center;
      position: relative;
    }

    .album-cover {
      width: 280px;
      height: 280px;
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
    }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .album-cover:hover img {
      transform: scale(1.05);
    }

    .album-cover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.7));
      border-radius: var(--border-radius);
    }

    .song-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      text-align: left;
    }

    .song-title {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: var(--primary-color);
    }

    .song-artist {
      font-size: 18px;
      color: var(--secondary-color);
      margin: 0 0 4px 0;
    }

    .song-album {
      font-size: 16px;
      color: var(--tertiary-color);
    }

    /* Progress Bar Section */
    .progress-section {
      padding: 0 40px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .progress-bar-container {
      height: 4px;
      background-color: rgba(255,255,255,255,0.1);
