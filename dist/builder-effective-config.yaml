directories:
  output: dist
  buildResources: build
appId: com.auroraletras.player
productName: Aurora Letras
win:
  target: nsis
  icon: logo.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
extraResources:
  - from: get-media.ps1
    to: get-media.ps1
files:
  - filter:
      - '**/*'
      - '!dist/**'
      - '!scraper.js'
      - '!scraper_history.json'
      - '!scraper_log.txt'
      - '!debug_*.png'
      - '!scraper_session'
      - '!get-media.ps1'
electronVersion: 36.3.1
