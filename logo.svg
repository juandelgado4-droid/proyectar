<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Fondo con degradado oscuro profundo -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161233" />
      <stop offset="100%" stop-color="#070412" />
    </radialGradient>

    <!-- Haz de luz del proyector (Efecto Aurora) -->
    <linearGradient id="auroraBeam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.2" />
      <stop offset="60%" stop-color="#7000ff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#f355da" stop-opacity="0" />
    </linearGradient>

    <!-- Gradiente para el isotipo de la letra "A" -->
    <linearGradient id="letterGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#f355da" />
    </linearGradient>

    <!-- Filtro de brillo sutil -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Contenedor del Icono (Estilo Windows App con esquinas redondeadas) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)" stroke="#211b47" stroke-width="4" />

  <!-- Haz de proyección de fondo -->
  <path d="M 256 120 L 100 400 L 412 400 Z" fill="url(#auroraBeam)" />

  <!-- Lente del Proyector (Origen de la luz) -->
  <g filter="url(#glow)">
    <circle cx="256" cy="100" r="16" fill="#ffffff" />
    <circle cx="256" cy="100" r="28" fill="none" stroke="#00f2fe" stroke-width="3" opacity="0.5" />
  </g>

  <!-- La "A" Proyectada (Isotipo principal) -->
  <g filter="url(#glow)">
    <!-- Líneas laterales del haz luminoso que enmarcan la A -->
    <line x1="256" y1="110" x2="80" y2="410" stroke="#00f2fe" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    <line x1="256" y1="110" x2="432" y2="410" stroke="#f355da" stroke-width="4" stroke-linecap="round" opacity="0.3" />

    <!-- Estructura de la letra "A" -->
    <path d="M 160 360 L 256 170 L 352 360" fill="none" stroke="url(#letterGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Travesaño dinámico de la "A" (simula una onda de sincronización) -->
    <path d="M 205 290 Q 256 260 307 290" fill="none" stroke="url(#letterGrad)" stroke-width="18" stroke-linecap="round" />
  </g>

  <!-- Partículas de luz flotantes (Letras/Partículas en el aire) -->
  <circle cx="180" cy="220" r="5" fill="#00f2fe" opacity="0.7" filter="url(#glow)" />
  <circle cx="330" cy="240" r="4" fill="#f355da" opacity="0.8" filter="url(#glow)" />
  <circle cx="230" cy="320" r="3" fill="#ffffff" opacity="0.9" />
</svg>
